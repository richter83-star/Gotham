version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: casegraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: casegraph
      POSTGRES_PASSWORD: casegraph
      POSTGRES_DB: casegraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../apps/api/app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casegraph"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: casegraph-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: casegraph-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/casegraph
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 | grep -q neo4j"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── OpenSearch ────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: casegraph-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Casegraph1!
      - plugins.security.disabled=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible evidence storage) ───────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    container_name: casegraph-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: casegraph-api
    restart: unless-stopped
    env_file: ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://casegraph:casegraph@postgres:5432/casegraph
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      OPENSEARCH_URL: http://opensearch:9200
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: casegraph-worker
    restart: unless-stopped
    env_file: ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://casegraph:casegraph@postgres:5432/casegraph
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ../../apps/api:/app
    command: celery -A app.services.ingestion.pipeline.celery_app worker --loglevel=info

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
    container_name: casegraph-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  minio_data:
